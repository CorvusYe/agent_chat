type: ai_model
name: select_nodes
config:
  description: "根据用户意图从已注册的 local_method 节点中选出合适的节点列表"
  model: deepseek-chat
  system_prompt: "根据用户需求，从 available_nodes 中选择合适的节点并按执行顺序排列。只选择 local_method 节点。输出节点名称列表。"
  output_schema:
    type: object
    properties:
      selected:
        type: array
        items:
          type: string
        description: 选中的节点名列表