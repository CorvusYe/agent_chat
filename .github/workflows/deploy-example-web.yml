# Deploy example app to GitHub Pages
#
# Builds the example Flutter app as a web application and publishes it
# to GitHub Pages. The app is served under the repository's Pages URL.
#
# Required setup (once per repository):
#   1. Go to Settings → Pages
#   2. Under "Source", select "GitHub Actions"
#
# The workflow then automatically deploys on every push to main.

name: Deploy Example Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          channel: stable

      - name: Enable web platform
        run: flutter config --enable-web
        working-directory: dart/example

      - name: Install dependencies
        run: flutter pub get
        working-directory: dart/example

      - name: Build web app
        run: flutter build web --release --base-href /agent_chat/
        working-directory: dart/example

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dart/example/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
